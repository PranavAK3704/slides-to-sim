services:
  - type: web
    name: slides-to-sim-api
    env: python
    region: oregon
    plan: free
    buildCommand: >
      cd backend &&
      pip install -r requirements.txt &&
      (python -m playwright install chromium || echo "Playwright install skipped")
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      # Paste the entire contents of your service-account JSON as the value
      - key: GOOGLE_SERVICE_ACCOUNT_JSON_CONTENT
        sync: false
      - key: OUTPUT_DIR
        value: /tmp/output
