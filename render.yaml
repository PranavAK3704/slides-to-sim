services:
  - type: web
    name: slides-to-sim-api
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt && python -m playwright install chromium"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: OUTPUT_DIR
        value: /tmp/output
